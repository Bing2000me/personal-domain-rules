rule-providers:
  personal-nsfw:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/Bing2000me/personal-domain-rules/main/rules/nsfw.list"
    path: ./ruleset/personal-nsfw.list
    interval: 86400

# YAML overrides can only prepend or append array items.
# This fallback appends the group to the bottom of the proxy-group list.
proxy-groups+:
  - name: "NSFW 手动切换"
    type: select
    proxies:
      - DIRECT
      - 手动切换
      - 香港节点
      - 日本节点
      - 美国节点
      - 台湾节点
      - 狮城节点
      - 韩国节点

+rules:
  - RULE-SET,personal-nsfw,NSFW 手动切换
